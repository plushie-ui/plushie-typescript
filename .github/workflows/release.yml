name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install
        env:
          PLUSHIE_SKIP_DOWNLOAD: "1"

      - name: Verify tag matches package version
        run: |
          PKG_VERSION="v$(node -p 'require("./package.json").version')"
          if [ "$PKG_VERSION" != "${{ github.ref_name }}" ]; then
            echo "Tag ${{ github.ref_name }} does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Preflight (lint + check + build)
        run: pnpm lint && pnpm check && pnpm build
        env:
          PLUSHIE_SKIP_DOWNLOAD: "1"

      - name: Download plushie binary
        run: node dist/cli/index.js download
        env:
          PLUSHIE_DOWNLOAD_IN_CI: "1"

      - name: Test
        run: pnpm test

      - name: API docs
        run: pnpm docs:check

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
