name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  PLUSHIE_SKIP_DOWNLOAD: "1"

jobs:
  ci:
    name: CI (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Check formatting and lint
        run: pnpm lint

      - name: Type check
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Download plushie binary
        run: node dist/cli/index.js download
        continue-on-error: true

      - name: Test (mock backend)
        run: pnpm test

      - name: Test (headless backend)
        run: PLUSHIE_TEST_BACKEND=headless pnpm test
        continue-on-error: true

      - name: API docs
        run: pnpm docs:check
